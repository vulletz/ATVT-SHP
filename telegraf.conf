[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = "ATVT"
  omit_hostname = false

# ==========================================
# ENTRADAS: metricas basicas del sistema
# ==========================================

[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false

[[inputs.mem]]

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

[[inputs.net]]

# ==========================================
# SALIDA: VictoriaMetrics via HTTP Prometheus
# ==========================================

[[outputs.http]]
  url = "http://127.0.0.1:8428/api/v1/import/prometheus"
  data_format = "prometheus"
